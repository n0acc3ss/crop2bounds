<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crop2Bounds — Autocrop to Content Bounds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', system-ui, sans-serif;
      background: #0c0f14;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── HERO ── */
    .c2b-hero {
      width: 100%;
      background: #141820;
      background-image: radial-gradient(ellipse 90% 70% at 50% 40%, #1c2232 0%, #0c0f14 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 2rem 3rem;
    }

    .c2b-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-conic-gradient(#ffffff05 0% 25%, transparent 0% 50%) 0 0 / 14px 14px;
      pointer-events: none;
    }

    .c2b-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, #0c0f14);
      pointer-events: none;
    }

    .c2b-icon-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 1.2rem;
    }

    .c2b-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #29c2f5;
      text-shadow: 0 0 80px rgba(41,194,245,0.3), 0 2px 0 rgba(0,0,0,0.7);
      margin: 0 0 0.55rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .c2b-subtitle {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(0.65rem, 1.8vw, 0.88rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      color: #8a94a8;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.8;
    }

    /* ── TOOL SECTION ── */
    .tool-wrap {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 0 1rem 3rem;
    }

    #drop-zone {
      width: 100%;
      border: 2px dashed #2e3545;
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #141820;
    }

    #drop-zone:hover {
      border-color: #3d5080;
      background: #161c28;
    }

    #drop-zone.drag-over {
      border-color: #29c2f5;
      background: #101828;
    }

    #drop-zone .drop-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.6rem;
    }

    #drop-zone p {
      color: #5a6478;
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    #drop-zone .drop-hint {
      display: inline-block;
      margin-top: 0.8rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #29c2f5;
      opacity: 0.7;
    }

    #file-input { display: none; }

    #options {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    label { font-size: 0.88rem; color: #7a8494; display: flex; align-items: center; gap: 0.45rem; }

    input[type=number] {
      width: 64px;
      background: #1a1e28;
      border: 1px solid #2e3545;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.3rem 0.5rem;
      font-size: 0.88rem;
    }

    input[type=checkbox] { accent-color: #29c2f5; }

    #status {
      font-size: 0.82rem;
      color: #4a5468;
      min-height: 1.2em;
      letter-spacing: 0.04em;
    }

    /* ── RESULTS ── */
    #results {
      width: 100%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 0 1rem 3rem;
    }

    .result-card {
      background: #141820;
      border: 1px solid #1e2435;
      border-radius: 14px;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.1rem;
      background: #181e2c;
      border-bottom: 1px solid #1e2435;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .result-header .filename {
      font-size: 0.83rem;
      color: #9aa4ba;
      word-break: break-all;
    }

    .result-header .meta {
      font-size: 0.76rem;
      color: #404858;
      white-space: nowrap;
    }

    .result-header .btn-download {
      background: #29c2f5;
      color: #06101a;
      border: none;
      border-radius: 7px;
      padding: 0.38rem 1rem;
      font-size: 0.83rem;
      font-weight: 600;
      font-family: 'Barlow', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .result-header .btn-download:hover { background: #45cefc; }
    .result-header .btn-download:active { transform: scale(0.97); }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #1e2435;
    }

    .preview-box {
      background: #0e1118;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .preview-box span {
      font-size: 0.72rem;
      color: #3a4458;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      background-image:
        linear-gradient(45deg, #1e2435 25%, transparent 25%),
        linear-gradient(-45deg, #1e2435 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1e2435 75%),
        linear-gradient(-45deg, transparent 75%, #1e2435 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      border-radius: 5px;
    }

    .error-msg {
      color: #e05555;
      font-size: 0.84rem;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <!-- ── HERO BANNER ── -->
  <header class="c2b-hero">
    <div class="c2b-icon-wrap">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="180" height="180" aria-label="Crop2Bounds icon">
        <defs>
          <pattern id="checker" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
            <rect width="7" height="7" fill="#2a2e3e"/>
            <rect x="7" y="0" width="7" height="7" fill="#1a1e2c"/>
            <rect x="0" y="7" width="7" height="7" fill="#1a1e2c"/>
            <rect x="7" y="7" width="7" height="7" fill="#2a2e3e"/>
          </pattern>
          <linearGradient id="metalFace" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#e8ecf4"/>
            <stop offset="28%"  stop-color="#c4cad8"/>
            <stop offset="62%"  stop-color="#8e96ac"/>
            <stop offset="100%" stop-color="#666e82"/>
          </linearGradient>
          <linearGradient id="metalDepthR" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#6e7688"/>
            <stop offset="100%" stop-color="#4a5060"/>
          </linearGradient>
          <linearGradient id="metalDepthB" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#5a6072"/>
            <stop offset="100%" stop-color="#3c4050"/>
          </linearGradient>
          <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#3a80e2"/>
            <stop offset="100%" stop-color="#1a55b8"/>
          </linearGradient>
          <linearGradient id="innerRing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#9aa4b8"/>
            <stop offset="50%"  stop-color="#bcc4d4"/>
            <stop offset="100%" stop-color="#7a8496"/>
          </linearGradient>
          <filter id="frameShad">
            <feDropShadow dx="4" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.75"/>
          </filter>
          <filter id="arrowShad">
            <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
          </filter>
        </defs>

        <!-- checkerboard behind blue -->
        <rect x="62" y="62" width="76" height="76" fill="url(#checker)"/>
        <!-- blue fill -->
        <rect x="62" y="70" width="76" height="68" fill="url(#blueGrad)"/>

        <!-- 3D depth faces -->
        <polygon points="50,148 58,156 150,156 142,148" fill="url(#metalDepthB)"/>
        <polygon points="142,58 150,50 150,156 142,148" fill="url(#metalDepthR)"/>

        <!-- main frame face -->
        <rect x="50" y="50" width="92" height="98" rx="2" fill="url(#metalFace)" filter="url(#frameShad)"/>
        <!-- cutout -->
        <rect x="62" y="62" width="68" height="74" fill="#0c1018"/>
        <!-- inner ring -->
        <rect x="62" y="62" width="68" height="74" rx="1" fill="none" stroke="url(#innerRing)" stroke-width="3"/>
        <!-- top highlight -->
        <rect x="50" y="50" width="92" height="2.5" rx="1" fill="#f2f4f8" opacity="0.7"/>
        <rect x="50" y="50" width="2.5" height="98" rx="1" fill="#eaecf2" opacity="0.5"/>

        <!-- handle tab -->
        <rect x="136" y="136" width="22" height="9" rx="2" fill="url(#metalFace)"/>
        <rect x="136" y="145" width="22" height="3" rx="1" fill="url(#metalDepthB)"/>

        <!-- arrows -->
        <g filter="url(#arrowShad)">
          <!-- top ↓ -->
          <line x1="100" y1="18" x2="100" y2="42" stroke="#ccd4e4" stroke-width="3" stroke-linecap="round"/>
          <polygon points="93,37 100,50 107,37" fill="#ccd4e4"/>
          <!-- bottom ↑ -->
          <line x1="100" y1="158" x2="100" y2="182" stroke="#ccd4e4" stroke-width="3" stroke-linecap="round"/>
          <polygon points="93,163 100,150 107,163" fill="#ccd4e4"/>
          <!-- left → -->
          <line x1="16" y1="100" x2="42" y2="100" stroke="#ccd4e4" stroke-width="3" stroke-linecap="round"/>
          <polygon points="37,93 50,100 37,107" fill="#ccd4e4"/>
          <!-- right ← -->
          <line x1="158" y1="100" x2="184" y2="100" stroke="#ccd4e4" stroke-width="3" stroke-linecap="round"/>
          <polygon points="163,93 150,100 163,107" fill="#ccd4e4"/>
        </g>
      </svg>
    </div>

    <h1 class="c2b-title">CROP2BOUNDS</h1>
    <p class="c2b-subtitle">
      Free, Simple, Private. Your files stay on your device.<br>
      Works directly in your browser.
    </p>
  </header>

  <!-- ── TOOL ── -->
  <div class="tool-wrap">
    <div id="drop-zone">
      <span class="drop-icon">🖼️</span>
      <p>Drop PNG or WebP files here, or click to browse</p>
      <span class="drop-hint">PNG &amp; WebP · Multiple files supported</span>
      <input type="file" id="file-input" accept=".png,.webp,image/png,image/webp" multiple />
    </div>

    <div id="options">
      <label>
        <input type="checkbox" id="opt-padding" />
        Add padding (px)
        <input type="number" id="padding-val" value="0" min="0" max="500" />
      </label>
    </div>

    <div id="status"></div>
  </div>

  <div id="results"></div>

  <canvas id="work-canvas" style="display:none"></canvas>

  <script>
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const results    = document.getElementById('results');
    const status     = document.getElementById('status');
    const workCanvas = document.getElementById('work-canvas');
    const ctx        = workCanvas.getContext('2d', { willReadFrequently: true });

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    function handleFiles(fileList) {
      const files = [...fileList].filter(f => f.type === 'image/png' || f.type === 'image/webp');
      if (!files.length) { status.textContent = 'No valid PNG or WebP files selected.'; return; }
      status.textContent = `Processing ${files.length} file(s)…`;
      Promise.all(files.map(processFile)).then(() => {
        status.textContent = `Done — ${files.length} file(s) processed.`;
      });
    }

    function processFile(file) {
      return new Promise(resolve => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          try {
            const pad = getPadding();
            const bounds = getContentBounds(img);
            const card = createCard(file, img, bounds, pad);
            results.prepend(card);
          } catch (e) {
            showError(file.name, e.message);
          }
          URL.revokeObjectURL(url);
          resolve();
        };
        img.onerror = () => { showError(file.name, 'Failed to load image.'); resolve(); };
        img.src = url;
      });
    }

    function getContentBounds(img) {
      workCanvas.width  = img.naturalWidth;
      workCanvas.height = img.naturalHeight;
      ctx.clearRect(0, 0, workCanvas.width, workCanvas.height);
      ctx.drawImage(img, 0, 0);

      const { data, width, height } = ctx.getImageData(0, 0, workCanvas.width, workCanvas.height);
      let top = height, bottom = 0, left = width, right = 0;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          if (data[(y * width + x) * 4 + 3] > 0) {
            if (y < top)    top    = y;
            if (y > bottom) bottom = y;
            if (x < left)   left   = x;
            if (x > right)  right  = x;
          }
        }
      }

      if (top > bottom || left > right) return { top: 0, left: 0, bottom: height - 1, right: width - 1 };
      return { top, left, bottom, right };
    }

    function renderCrop(img, bounds, pad) {
      const srcX = Math.max(0, bounds.left   - pad);
      const srcY = Math.max(0, bounds.top    - pad);
      const srcR = Math.min(img.naturalWidth  - 1, bounds.right  + pad);
      const srcB = Math.min(img.naturalHeight - 1, bounds.bottom + pad);
      const w = srcR - srcX + 1;
      const h = srcB - srcY + 1;

      const out = document.createElement('canvas');
      out.width = w; out.height = h;
      out.getContext('2d').drawImage(img, srcX, srcY, w, h, 0, 0, w, h);
      return { dataURL: out.toDataURL(img._mime), w, h, srcX, srcY };
    }

    function createCard(file, img, bounds, pad) {
      img._mime = file.type;
      const { dataURL, w, h, srcX, srcY } = renderCrop(img, bounds, pad);
      const origW = img.naturalWidth, origH = img.naturalHeight;
      const ext = file.type === 'image/webp' ? 'webp' : 'png';
      const outName = file.name.replace(/\.[^.]+$/, '') + '_cropped.' + ext;

      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-header">
          <span class="filename">${file.name}</span>
          <span class="meta">${origW}×${origH} &rarr; ${w}×${h} &nbsp;|&nbsp; offset (${srcX}, ${srcY})</span>
          <button class="btn-download">↓ Download</button>
        </div>
        <div class="preview-row">
          <div class="preview-box"><span>Original</span><img src="${URL.createObjectURL(file)}" /></div>
          <div class="preview-box"><span>Cropped</span><img src="${dataURL}" /></div>
        </div>`;

      card.querySelector('.btn-download').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = dataURL; a.download = outName; a.click();
      });
      return card;
    }

    function showError(name, msg) {
      const div = document.createElement('div');
      div.className = 'result-card';
      div.innerHTML = `<div class="result-header"><span class="filename">${name}</span></div>
                       <p class="error-msg">Error: ${msg}</p>`;
      results.prepend(div);
    }

    function getPadding() {
      if (!document.getElementById('opt-padding').checked) return 0;
      return Math.max(0, parseInt(document.getElementById('padding-val').value, 10) || 0);
    }
  </script>
</body>
</html>
